<div class="login-wrapper">

  <!-- Fondo decorativo -->
  <div class="bg-shapes" aria-hidden="true">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="grid-lines"></div>
  </div>

  <!-- Tarjeta -->
  <div class="login-card">

    <!-- Marca -->
<div class="card-top">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 40 40" fill="none">
            <polygon points="20,2 38,12 38,28 20,38 2,28 2,12" fill="none" stroke="currentColor" stroke-width="2"/>
            <polygon points="20,10 30,16 30,24 20,30 10,24 10,16" fill="currentColor" opacity="0.3"/>
            <circle cx="20" cy="20" r="4" fill="currentColor"/>
          </svg>
        </div>
        <span class="brand-name">NEXUS</span>
      </div>
      <a class="home-link" routerLink="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12,19 5,12 12,5"/>
        </svg>
        <span>Home</span>
      </a>
    </div>
    <!-- Encabezado -->
    <div class="card-header">
      <h1>Bienvenido</h1>
      <p>Ingresa tus credenciales para continuar</p>
    </div>

    <!-- Mensaje de error -->
    @if (errorMsg) {
      <div class="error-msg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>{{ errorMsg }}</span>
      </div>
    }

    <!-- Formulario -->
    <div class="login-form">

      <div class="field-group" [class.focused]="focused === 'email'">
        <label for="email">Correo electrónico</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m2 7 10 7 10-7"/>
            </svg>
          </span>
          <input
            id="email"
            type="email"
            placeholder="tu@correo.com"
            [(ngModel)]="email"
            (focus)="focused = 'email'"
            (blur)="focused = ''"
          />
        </div>
      </div>

      <div class="field-group" [class.focused]="focused === 'pwd'">
        <label for="pwd">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="5" y="11" width="14" height="10" rx="2"/>
              <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
              <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
            </svg>
          </span>
          <input
            id="pwd"
            [type]="showPwd ? 'text' : 'password'"
            placeholder="••••••••"
            [(ngModel)]="password"
            (focus)="focused = 'pwd'"
            (blur)="focused = ''"
          />
          <button title="toggle-password" class="toggle-password" type="button" (click)="showPwd = !showPwd">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="forgot-row">
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>

      <button class="btn-submit" [disabled]="loading" (click)="doLogin()">
        @if (loading) {
          <span class="spinner"></span>
          <span>Verificando...</span>
        } @else {
          <span>Iniciar sesión</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12,5 19,12 12,19"/>
          </svg>
        }
      </button>

    </div>

    <p class="card-footer">¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
  </div>
</div>
